<!DOCTYPE html>
<html ng-app="">
<head>
    <title>Email Validation</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body>

    <form name="myForm">
        <h3>Email Validation</h3>

        <input type="email" name="email" ng-model="email" required>

        <p style="color:red" ng-show="myForm.email.$dirty && myForm.email.$invalid">
            Invalid Email!
        </p>

        <p style="color:green" ng-show="myForm.email.$valid">
            Valid Email
        </p>
    </form>

</body>
</html>
